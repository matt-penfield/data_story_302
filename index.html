<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Who Talks to Whom</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <header>
    <h1>Who Talks to Whom</h1>
    <p class="subtitle">Collaboration patterns across design teams & cross-functional partners</p>
  </header>

  <nav class="view-tabs">
    <button class="tab active" data-view="network">Network Graph</button>
    <button class="tab" data-view="heatmap">Team Heatmap</button>
    <button class="tab" data-view="quarters">Quarterly View</button>
  </nav>

  <main>
    <section id="network" class="view active">
      <div class="view-header">
        <h2>Interaction Network</h2>
        <div class="controls">
          <label>
            <span>Min. connections</span>
            <input type="range" id="edge-threshold" min="1" max="10" value="1">
            <output id="threshold-value">1</output>
          </label>
        </div>
      </div>
      <div class="legend" id="network-legend"></div>
      <div class="chart-container" id="network-chart"></div>
      <aside class="insight-panel" id="network-insight">
        <h3>Insights</h3>
        <ul id="insight-list"></ul>
      </aside>
    </section>

    <section id="heatmap" class="view">
      <div class="view-header">
        <h2>Team-to-Team Interaction Density</h2>
      </div>
      <div class="chart-container" id="heatmap-chart"></div>
    </section>

    <section id="quarters" class="view">
      <div class="view-header">
        <h2>Network Shape by Quarter</h2>
      </div>
      <div class="small-multiples" id="quarters-chart"></div>
    </section>
  </main>

  <footer>
    <p>Data aggregated & anonymized. Connection frequency only — no message content.</p>
  </footer>

  <div class="tooltip" id="tooltip"></div>

  <script src="app.js"></script>
</body>
</html>
